name: Scala Steward
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: 17
          distribution: temurin
      - name: Run Scala-Steward
        uses: scala-steward-org/scala-steward-action@v2.84.0
        with:
          branches: main
          mill-version: 1.2.0-RC1
          repo-config: .scala-steward.conf
